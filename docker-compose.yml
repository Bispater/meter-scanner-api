version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: hydroscan
      POSTGRES_USER: hydroscan
      POSTGRES_PASSWORD: hydroscan123
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    environment:
      SECRET_KEY: change-me-to-a-real-secret-key
      DEBUG: "True"
      ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: "http://localhost:4200,http://127.0.0.1:4200,http://localhost:8001"
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: hydroscan
      DB_USER: hydroscan
      DB_PASSWORD: hydroscan123
      DB_HOST: db
      DB_PORT: "5432"
    ports:
      - "8001:8001"
    volumes:
      - ./media:/app/media
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py seed_data &&
        gunicorn config.wsgi:application --bind 0.0.0.0:8001 --workers 3
      "

volumes:
  pgdata:
