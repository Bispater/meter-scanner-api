services:
  db:
    image: postgres:16-alpine
    restart: always
    env_file: .env.prod
    environment:
      POSTGRES_DB: ${DB_NAME:-hydroscan}
      POSTGRES_USER: ${DB_USER:-hydroscan}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hydroscan123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - hydroscan-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hydroscan}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file: .env.prod
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-hydroscan}
      DB_USER: ${DB_USER:-hydroscan}
      DB_PASSWORD: ${DB_PASSWORD:-hydroscan123}
      DB_HOST: db
      DB_PORT: "5432"
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "${API_PORT:-8001}:8001"
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
    networks:
      - hydroscan-network
    # No ejecutar seed_data aquí: en cada deploy reseteaba contraseñas demo y asignaciones de operadores.
    # Primera carga / demo: docker compose exec web python manage.py seed_data
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput &&
        gunicorn config.wsgi:application --bind 0.0.0.0:8001 --workers 4 --timeout 120
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/api/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  pgdata:
    driver: local

networks:
  hydroscan-network:
    driver: bridge
